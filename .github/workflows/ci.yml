name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: shipyard
          POSTGRES_PASSWORD: test
          POSTGRES_DB: shipyard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Lint everything
      - run: pnpm lint

      # Build shared types first (backend + frontend depend on this)
      - run: pnpm --filter @shipyard/shared build

      # Generate Prisma client (gitignored — must run in CI before compiling)
      # DATABASE_URL is required by prisma.config.ts at load time even though
      # generate doesn't connect to the database
      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://localhost/dummy
        run: pnpm --filter api exec npx prisma generate

      # Run backend tests
      - name: Run API tests
        env:
          DATABASE_URL: postgresql://shipyard:test@localhost:5432/shipyard_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret
          JWT_EXPIRATION: 7d
          PORT: 3000
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:4200
        run: |
          pnpm --filter api exec npx prisma migrate deploy
          pnpm --filter api test

      # Run frontend tests (ng test with @angular/build:unit-test runs once and exits)
      - name: Run frontend tests
        run: pnpm --filter web test

      # Build everything (shared → api + web via Turborepo)
      - run: pnpm build

  docker:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/shipyard/api:latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/web.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/shipyard/web:latest
